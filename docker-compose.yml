version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: acadex
      POSTGRES_USER: acadex
      POSTGRES_PASSWORD: acadex
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - prometheus
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/acadex
      DATABASE_USERNAME: acadex
      DATABASE_PASSWORD: acadex
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8080:8080"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
